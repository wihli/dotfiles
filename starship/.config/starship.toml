# Minimal, fast starship config
# https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$time \
$character"""

# Faster - don't scan for languages not in use
scan_timeout = 10

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "
style = "purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"

[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M:%S"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
